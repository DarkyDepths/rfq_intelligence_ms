services:
  intelligence_db:
    image: postgres:16
    container_name: rfq_intelligence_postgres
    environment:
      POSTGRES_USER: intelligence_user
      POSTGRES_PASSWORD: intelligence_pass
      POSTGRES_DB: rfq_intelligence_db
    ports:
      - "5433:5432"
    volumes:
      - intelligence_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelligence_user -d rfq_intelligence_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  intelligence_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfq_intelligence_api
    environment:
      DATABASE_URL: postgresql+psycopg2://intelligence_user:intelligence_pass@intelligence_db:5432/rfq_intelligence_db
      APP_NAME: rfq_intelligence_ms
      APP_PORT: 8001
      ENVIRONMENT: development
      APP_DEBUG: "false"
      CORS_ORIGINS: "*"
      MANAGER_MS_BASE_URL: http://host.docker.internal:18000
    ports:
      - "8001:8001"
    depends_on:
      intelligence_db:
        condition: service_healthy
    command: >-
      sh -c "set -e;
      echo '[bootstrap] Applying database migrations...';
      alembic upgrade head;
      echo '[bootstrap] Starting Intelligence API server...';
      exec uvicorn src.app:app --host 0.0.0.0 --port 8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  intelligence_postgres_data:
